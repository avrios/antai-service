# In order to speed up builds (that will pull the docker images down every time), but even more importantly
# to get around the docker hub rate limiting (https://www.docker.com/increase-rate-limits), we're pointing
# test containers to pull from a (public) registry we maintain ourselves.

# Refer to https://www.testcontainers.org/features/image_name_substitution/#automatically-modifying-docker-hub-image-names
# for additional information on the available possibilities.
#
# IMPORTANT NOTE:
# ---------------
# You will need to add new image (versions) to the public ECR repo as you start using them during testing

# To add a new image, run the following commands (this is for ryuk:0.5.1):

# docker pull public.ecr.aws/ryte/testcontainers/ryuk:0.5.1
# docker images -> find image id, for 0.5.1 it is ec913eeff75a
# docker tag ec913eeff75a public.ecr.aws/q7f2o1o1/testcontainers/ryuk:0.5.1
# docker push public.ecr.aws/q7f2o1o1/testcontainers/ryuk:0.5.1

hub.image.name.prefix=public.ecr.aws/q7f2o1o1/
