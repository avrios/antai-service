## Spring Boot
server.port                                            = @exec.config.port@
server.servlet.contextPath                             = /@avr.service.name.short@
# increase max http request header size (from default 8KB) to match the AWS API Gateway hard limit
server.max-http-request-header-size             = 10240B

management.endpoints.web.base-path                     = /
management.endpoints.web.path-mapping.health           = healthCheck
management.endpoints.web.exposure.include              = health, info
management.endpoint.health.show-details                = always
management.endpoint.health.show-components             = always

management.metrics.enable.avr.http                     = false

## AWS
aws.ssoProfile                                         = @aws.ssoProfile@
aws.avrios.stage                                       = @aws.avrios.stage@

