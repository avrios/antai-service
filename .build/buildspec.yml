version: 0.2

env:
  shell: bash

run-as: codebuild-user

phases:
  install:
    run-as: root
    runtime-versions:
      java: corretto17
      nodejs: 18
      avrios: 1
    commands:
      - restore-maven-cache -u codebuild-user

  pre_build:
    commands:
      - MAJOR_VERSION=1
      - RELEASE_VERSION=${RELEASE_VERSION_PREFIX}${MAJOR_VERSION}.${CODEBUILD_BUILD_NUMBER}${RELEASE_VERSION_POSTFIX}
      - echo ${RELEASE_VERSION}

  build:
    commands:
      - mvn versions:set versions:update-child-modules -DnewVersion=${RELEASE_VERSION} -s .build/codeartifact.xml
      - HOME=/home/codebuild-user mvn clean deploy -Ddocker.tags.latest=${DOCKER_TAGS_LATEST} -s .build/codeartifact.xml
      - printf "{\"imageTag\":\"${RELEASE_VERSION}\"}" > imagedefinitions.json

  post_build:
    commands:
      - prepare-maven-cache -u codebuild-user -p com/avrios/blueprint
      # Tag git on RELEASE-* versions
      - jq --arg ref "refs/tags/${RELEASE_VERSION}" --arg sha "${CODEBUILD_RESOLVED_SOURCE_VERSION}" '.ref=$ref | .sha=$sha' ./.build/templates/github_create_tag_commit.json > /tmp/payload.json
      - >
        if [[ $RELEASE_VERSION_PREFIX == RELEASE* ]];
        then
          curl \
          -X POST \
          -H "Accept: application/vnd.github+json" \
          -H "Authorization: token ${GITHUB_TOKEN}" \
          -d @/tmp/payload.json \
          -f \
          https://api.github.com/repos/avrios/blueprint-service/git/refs
        fi;

artifacts:
  files:
    - 'imagedefinitions.json'
    - 'release/infrastructure/cdk.out/*'
  discard-paths: yes

cache:
  paths:
    - '/home/codebuild-user/maven_cache.tar'
